server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: payment-system

  datasource:
    url: ${MYSQL_PUBLIC_URL}?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDIS_PASSWORD}
      timeout: 6000

logging:
  level:
    root: INFO
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
