server:
  port: 8080

spring:

  datasource:
    url: ${DB_URL}

    username: ${DB_USERNAME}

    password: ${DB_PASSWORD}

    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: false

  data:

    redis:
      host: ${REDIS_HOST}

      port: ${REDIS_PORT}

jwt:
  secret: ${JWT_SECRET}

  expiration: 86400000

logging:

  level:
    org.springframework.security: INFO